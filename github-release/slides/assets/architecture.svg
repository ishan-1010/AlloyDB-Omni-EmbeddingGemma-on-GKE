<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa0a6"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
    <style>
      .box      { fill: #14171c; stroke: #2a2f36; stroke-width: 1.5; rx: 10; }
      .cluster  { fill: #0f1418; stroke: #4285F4; stroke-width: 2; stroke-dasharray: 6 4; rx: 14; }
      .ns       { fill: none; stroke: #2a2f36; stroke-width: 1; stroke-dasharray: 3 3; rx: 8; }
      .pod      { fill: #14171c; stroke: #34A853; stroke-width: 1.5; rx: 8; }
      .gcs      { fill: #14171c; stroke: #FBBC04; stroke-width: 1.5; rx: 8; }
      .label    { fill: #e8eaed; font-size: 15px; font-weight: 500; }
      .sub      { fill: #9aa0a6; font-size: 12px; }
      .mono     { fill: #c8f5c8; font-size: 11px; font-family: "JetBrains Mono", monospace; font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0; }
      .hdr      { fill: #4285F4; font-size: 13px; font-weight: 600; letter-spacing: 1px; }
      .hdr-g    { fill: #34A853; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
      .hdr-y    { fill: #FBBC04; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
      .arrow    { stroke: #9aa0a6; stroke-width: 1.5; fill: none; }
      .arrow-g  { stroke: #34A853; stroke-width: 1.8; fill: none; }
      .arrow-y  { stroke: #FBBC04; stroke-width: 1.5; fill: none; }
      .arrow-lbl{ fill: #e8eaed; font-size: 11px; font-weight: 500; }
    </style>
  </defs>

  <!-- You -->
  <circle cx="50" cy="300" r="24" fill="#14171c" stroke="#EA4335" stroke-width="2"/>
  <text x="50" y="306" text-anchor="middle" class="label">You</text>
  <text x="50" y="345" text-anchor="middle" class="sub">laptop</text>

  <!-- Cloud Shell -->
  <rect x="100" y="260" width="160" height="80" class="box"/>
  <text x="180" y="284" text-anchor="middle" class="hdr">CLOUD SHELL</text>
  <text x="180" y="305" text-anchor="middle" class="label">browser terminal</text>
  <text x="180" y="324" text-anchor="middle" class="sub">gcloud · kubectl · psql</text>

  <!-- GKE cluster boundary -->
  <rect x="340" y="90" width="620" height="400" class="cluster"/>
  <text x="360" y="118" class="hdr">GKE CLUSTER</text>
  <text x="482" y="118" class="sub">· 3× e2-standard-4 · regional us-central1</text>

  <!-- default namespace -->
  <rect x="360" y="145" width="580" height="220" class="ns"/>
  <text x="378" y="165" class="hdr-g">namespace: default</text>

  <!-- AlloyDB Omni pod (moved right to give arrow room) -->
  <rect x="395" y="190" width="200" height="155" class="pod"/>
  <text x="495" y="214" text-anchor="middle" class="hdr-g">ALLOYDB OMNI POD</text>
  <text x="495" y="238" text-anchor="middle" class="label">PostgreSQL 15</text>
  <text x="495" y="258" text-anchor="middle" class="mono">al-*-my-omni-0</text>
  <text x="495" y="283" text-anchor="middle" class="sub">pgvector · google_ml.*</text>
  <text x="495" y="302" text-anchor="middle" class="sub">cymbal_products (941)</text>
  <text x="495" y="321" text-anchor="middle" class="sub">cymbal_embedding (941)</text>

  <!-- TEI pod -->
  <rect x="700" y="190" width="200" height="155" class="pod"/>
  <text x="800" y="214" text-anchor="middle" class="hdr-g">TEI POD</text>
  <text x="800" y="238" text-anchor="middle" class="label">EmbeddingGemma 300m</text>
  <text x="800" y="258" text-anchor="middle" class="mono">tei-deployment-*</text>
  <text x="800" y="283" text-anchor="middle" class="sub">HuggingFace TEI server</text>
  <text x="800" y="302" text-anchor="middle" class="sub">CPU inference · 4 Gi</text>
  <text x="800" y="321" text-anchor="middle" class="sub">text → 768-dim float[]</text>

  <!-- alloydb-omni-system namespace -->
  <rect x="360" y="385" width="580" height="80" class="ns" stroke="#FBBC04"/>
  <text x="378" y="405" class="hdr-y">namespace: alloydb-omni-system</text>
  <rect x="380" y="415" width="540" height="40" class="pod" stroke="#FBBC04"/>
  <text x="650" y="440" text-anchor="middle" class="label">ALLOYDB OMNI OPERATOR · watches DBCluster CR, reconciles DB state</text>

  <!-- GCS -->
  <rect x="815" y="30" width="140" height="65" class="gcs"/>
  <text x="885" y="52" text-anchor="middle" class="hdr-y">GCS BUCKET</text>
  <text x="885" y="72" text-anchor="middle" class="label">Cymbal CSVs</text>
  <text x="885" y="88" text-anchor="middle" class="sub">seed data · one-time</text>

  <!-- You → Cloud Shell arrow -->
  <path d="M 76 300 L 98 300" class="arrow" marker-end="url(#arr)"/>

  <!-- Cloud Shell → AlloyDB pod arrow (clean horizontal path, enters via left edge) -->
  <path d="M 262 300 L 393 268" class="arrow-g" marker-end="url(#arrg)"/>
  <text x="280" y="282" class="hdr-g">kubectl exec</text>
  <text x="280" y="298" class="sub">psql inside pod</text>

  <!-- AlloyDB → TEI (top arrow, HTTP POST) -->
  <path d="M 597 235 L 698 235" class="arrow" marker-end="url(#arr)"/>
  <text x="648" y="227" text-anchor="middle" class="arrow-lbl">HTTP POST /embed</text>

  <!-- TEI → AlloyDB (bottom arrow, vector back) -->
  <path d="M 698 305 L 597 305" class="arrow" marker-end="url(#arr)"/>
  <text x="648" y="325" text-anchor="middle" class="arrow-lbl">768-dim vector</text>

  <!-- Service DNS label below arrows -->
  <text x="648" y="355" text-anchor="middle" class="mono">tei-service.default.svc.cluster.local :80</text>

  <!-- GCS → AlloyDB bulk load arrow (top-down, routed over cluster boundary) -->
  <path d="M 885 97 L 885 130 L 495 130 L 495 190" class="arrow-y" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="690" y="125" text-anchor="middle" fill="#FBBC04" font-size="12">one-time bulk load (gcloud storage cp → \copy)</text>

  <!-- Footer caption -->
  <text x="500" y="520" text-anchor="middle" class="sub">All pods talk cluster-internal · no public IPs, no jump-box VM, no Python middleware</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FBBC04"/>
    </marker>
    <style>
      .step   { fill: #14171c; stroke: #34A853; stroke-width: 1.5; rx: 10; }
      .step-l { fill: #14171c; stroke: #FBBC04; stroke-width: 2; rx: 10; }
      .ttl    { fill: #e8eaed; font-size: 15px; font-weight: 600; }
      .sub    { fill: #9aa0a6; font-size: 12px; }
      .arrow  { stroke: #FBBC04; stroke-width: 1.8; fill: none; }
      .title  { fill: #e8eaed; font-size: 20px; font-weight: 600; }
      .caption{ fill: #9aa0a6; font-size: 13px; font-style: italic; }
    </style>
  </defs>

  <text x="500" y="35" text-anchor="middle" class="caption">retrieval first, generation second</text>

  <rect x="30"  y="120" width="170" height="100" class="step"/>
  <text x="115" y="155" text-anchor="middle" class="ttl">User question</text>
  <text x="115" y="180" text-anchor="middle" class="sub">natural language</text>

  <rect x="230" y="120" width="210" height="100" class="step"/>
  <text x="335" y="148" text-anchor="middle" class="ttl">Semantic search</text>
  <text x="335" y="170" text-anchor="middle" class="sub">(today's demo)</text>
  <text x="335" y="192" text-anchor="middle" class="sub">AlloyDB Omni returns</text>
  <text x="335" y="208" text-anchor="middle" class="sub">top-K relevant docs</text>

  <rect x="470" y="120" width="210" height="100" class="step-l"/>
  <text x="575" y="148" text-anchor="middle" class="ttl" fill="#FBBC04">LLM (Gemini)</text>
  <text x="575" y="175" text-anchor="middle" class="sub">grounded by retrieved</text>
  <text x="575" y="191" text-anchor="middle" class="sub">docs, writes answer</text>

  <rect x="710" y="120" width="260" height="100" class="step"/>
  <text x="840" y="155" text-anchor="middle" class="ttl">Grounded answer</text>
  <text x="840" y="182" text-anchor="middle" class="sub">factual, citable,</text>
  <text x="840" y="200" text-anchor="middle" class="sub">no hallucinated products</text>

  <path d="M 202 170 L 228 170" class="arrow" marker-end="url(#arrr)"/>
  <path d="M 442 170 L 468 170" class="arrow" marker-end="url(#arrr)"/>
  <path d="M 682 170 L 708 170" class="arrow" marker-end="url(#arrr)"/>

  <text x="500" y="278" text-anchor="middle" fill="#e8eaed" font-size="13" font-weight="500">
    AlloyDB Omni owns the "R" — Retrieval. The LLM handles the "G" — Generation.
  </text>
  <text x="500" y="302" text-anchor="middle" class="caption">
    this is why the DB matters: bad retrieval = confident wrong answers
  </text>
</svg>
